<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slope Explorer</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Fira+Code&display=swap" rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>

  <!-- Our Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>📐 Slope Explorer</h1>
    <p class="subtitle">Plot points, walk the staircase, and discover slope step-by-step.</p>
  </header>

  <main>
    <!-- Controls Panel -->
    <section class="controls">
      <h2>Set Your Points</h2>

      <div class="input-row">
        <div class="input-group">
          <label for="x1">x₁</label>
          <input type="number" id="x1" value="1" />
        </div>
        <div class="input-group">
          <label for="y1">y₁</label>
          <input type="number" id="y1" value="2" />
        </div>
      </div>

      <div class="input-row">
        <div class="input-group">
          <label for="x2">x₂</label>
          <input type="number" id="x2" value="5" />
        </div>
        <div class="input-group">
          <label for="y2">y₂</label>
          <input type="number" id="y2" value="8" />
        </div>
      </div>

      <button id="plotBtn" class="btn primary">Plot &amp; Calculate</button>
      <button id="resetBtn" class="btn secondary">Reset</button>

      <!-- Results -->
      <div id="results" class="results hidden">
        <h3>Results</h3>
        <p><strong>Rise (Δy):</strong> <span id="rise">—</span></p>
        <p><strong>Run (Δx):</strong> <span id="run">—</span></p>
        <p class="slope-result"><strong>Slope (m):</strong> <span id="slope">—</span></p>
        <p><strong>Equation:</strong> <span id="equation">—</span></p>
      </div>
    </section>

    <!-- Graph Panel -->
    <section class="graph-panel">
      <canvas id="slopeChart"></canvas>
    </section>
  </main>

  <footer>
    <p>Built for learning &middot; Slope Explorer</p>
  </footer>

  <!-- Our Script -->
  <script src="script.js"></script>
</body>
</html>
